name: release

# MANUAL trigger only. Figures out which packages to release, cross-compiles each
# to all native targets + wasm, cuts a per-package GitHub Release (tag
# <pkg>-vX.Y.Z), and publishes the wasm build to npm.
on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Which packages: "changed" (since last tag) or a space-separated list (e.g. "drlg items")'
        default: 'changed'
        type: string
      force_all:
        description: 'Release every C-ABI package regardless of changes'
        type: boolean
        default: false
      dry_run:
        description: 'Build + package only — no tags, no GitHub Release, no npm publish'
        type: boolean
        default: false

permissions:
  contents: write   # create tags + releases
  id-token: write   # OIDC trusted publishing to npm (provenance, no NPM_TOKEN secret)

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.d.outputs.packages }}
      any: ${{ steps.d.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # need all tags for change detection
      - id: d
        env:
          FORCE_ALL: ${{ inputs.force_all }}
        run: |
          if [ "${{ inputs.force_all }}" = "true" ]; then
            pkgs="$(FORCE_ALL=1 scripts/detect-changes.sh)"
          elif [ -n "${{ inputs.packages }}" ] && [ "${{ inputs.packages }}" != "changed" ]; then
            pkgs="$(scripts/detect-changes.sh ${{ inputs.packages }})"
          else
            pkgs="$(scripts/detect-changes.sh)"
          fi
          echo "packages=$pkgs" >> "$GITHUB_OUTPUT"
          if [ "$pkgs" = "[]" ]; then echo "any=false" >> "$GITHUB_OUTPUT";
          else echo "any=true" >> "$GITHUB_OUTPUT"; fi
          echo "selected: $pkgs"

  build:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - x86_64-macos
          - aarch64-macos
          - x86_64-windows-gnu
          - aarch64-windows-gnu
          - wasm32-freestanding
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with: { version: 0.16.0 }
      - name: Build changed packages for ${{ matrix.target }}
        run: |
          echo '${{ needs.detect.outputs.packages }}' > /tmp/pkgs.json
          opt=ReleaseFast
          [ "${{ matrix.target }}" = "wasm32-freestanding" ] && opt=ReleaseSmall
          for row in $(jq -r '.[] | @base64' /tmp/pkgs.json); do
            _j() { echo "$row" | base64 -d | jq -r "$1"; }
            name="$(_j .name)"; dir="$(_j .dir)"
            echo "== $name -> ${{ matrix.target }}"
            ( cd "$dir" && zig build -Dtarget=${{ matrix.target }} -Doptimize=$opt -Dcli=false \
                --prefix "$GITHUB_WORKSPACE/dist/$name/${{ matrix.target }}" )
          done
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/
          if-no-files-found: ignore

  release:
    needs: [detect, build]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with: { path: artifacts, pattern: dist-*, merge-multiple: true }
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: 'https://registry.npmjs.org' }
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest   # trusted publishing needs npm >= 11.5.1
      - name: Package, tag, release, publish
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          echo '${{ needs.detect.outputs.packages }}' > /tmp/pkgs.json
          for row in $(jq -r '.[] | @base64' /tmp/pkgs.json); do
            _j() { echo "$row" | base64 -d | jq -r "$1"; }
            name="$(_j .name)"; version="$(_j .version)"; tag="$(_j .tag)"
            echo "::group::release $tag"

            # one archive per target. The download merges every dist-<target>
            # artifact into artifacts/, so the package tree lands at some depth as
            # .../<name>/<target>/… — find the <name> dir(s) and archive each
            # immediate <target> subdir. Robust to the merge layout.
            mkdir -p out
            while IFS= read -r ndir; do
              for tdir in "$ndir"/*/; do
                [ -d "$tdir" ] || continue
                target="$(basename "$tdir")"
                ( cd "$tdir" && tar czf "$GITHUB_WORKSPACE/out/d2${name}-${version}-${target}.tar.gz" . )
              done
            done < <(find artifacts -type d -name "$name")
            echo "archived:"; ls -1 out/ || true

            if [ "$DRY_RUN_INPUT" = "true" ]; then
              echo "dry run: would release $tag with:"; ls -1 out/
              rm -rf out; echo "::endgroup::"; continue
            fi

            git tag "$tag" && git push origin "$tag"
            gh release create "$tag" out/d2${name}-${version}-*.tar.gz \
              --title "$name v$version" \
              --notes "Release of the \`$name\` package (v$version). Native libs + headers per target, plus wasm."

            # npm: publish the wasm build behind the typed shim via OIDC trusted
            # publishing (build provenance, no NPM_TOKEN). Requires the package to be
            # configured with this repo/workflow as a trusted publisher on npmjs.com,
            # and a first release published by hand (OIDC can't bootstrap the name).
            wasm="$(find artifacts -path "*/$name/wasm32-freestanding/*" -name '*.wasm' | head -1 || true)"
            if [ -n "$wasm" ]; then
              scripts/npm-pack.sh "$name" "$version" "$wasm"
            else
              echo "skip npm ($name): no wasm artifact"
            fi
            rm -rf out
            echo "::endgroup::"
          done
